name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install ShellCheck
        run: sudo apt-get install -y shellcheck
      - name: Lint shell scripts
        run: |
          shopt -s nullglob
          files=(*.sh)
          if [ ${#files[@]} -eq 0 ]; then
            echo "No .sh files found"
            exit 0
          fi
          echo "Checking ${#files[@]} scripts..."
          failed=0
          for f in "${files[@]}"; do
            if ! shellcheck -S warning -e SC1090,SC1091 "$f"; then
              failed=$((failed + 1))
            fi
          done
          echo "$((${#files[@]} - failed))/${#files[@]} scripts passed"
          # Don't fail the build — report only
          exit 0

  syntax-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Bash syntax check
        run: |
          failed=0
          total=0
          for f in *.sh; do
            total=$((total + 1))
            if ! bash -n "$f" 2>/dev/null; then
              echo "SYNTAX ERROR: $f"
              failed=$((failed + 1))
            fi
          done
          echo "$((total - failed))/$total scripts have valid syntax"
          if [ $failed -gt 0 ]; then exit 1; fi
